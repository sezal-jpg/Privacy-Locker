name: CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  docker:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u "${{ secrets.DOCKERHUB_USERNAME }}" --password-stdin

      - name: Build frontend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/privacy-locker-frontend ./client

      - name: Build backend image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/privacy-locker-backend ./server

      - name: Push frontend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/privacy-locker-frontend

      - name: Push backend image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/privacy-locker-backend